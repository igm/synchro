name: Synchro
options:
  bundleIdPrefix: com.igm
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: true
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
    INFOPLIST_KEY_CFBundleDisplayName: Synchro
targets:
  Synchro:
    type: application
    platform: macOS
    sources:
      - path: Sources/Synchro
        excludes:
          - "Synchro.entitlements"
          - "PrivacyInfo.xcprivacy"
          - "AppIcon.icns"
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: Sources/Synchro/Synchro.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.igm.synchro
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 igm. All rights reserved."
    resources:
      - path: Sources/Synchro/PrivacyInfo.xcprivacy
      - path: Sources/Synchro/Assets.xcassets
